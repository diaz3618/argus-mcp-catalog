name: "Brave Search (subprocess)"
description: "Web search using Brave's search API. Requires a Brave API key. Runs as a subprocess via npx."

brave-search:
  type: stdio
  command: npx
  args:
    - "-y"
    - "@modelcontextprotocol/server-brave-search"
  env:
    BRAVE_API_KEY: "${BRAVE_API_KEY}"
